services:
  postgres:
    image: postgres:16
    container_name: qatask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_SUPERUSER}
      POSTGRES_PASSWORD: ${PG_SUPERPASS}
      POSTGRES_DB: ${PG_SUPERDB}
      KC_DB_USER: ${KC_DB_USER}
      KC_DB_PASS: ${KC_DB_PASS}
      KC_DB_NAME: ${KC_DB_NAME}
      APP_DB_USER: ${APP_DB_USER:-}
      APP_DB_PASS: ${APP_DB_PASS:-}
      APP_DB_NAME: ${APP_DB_NAME:-}
    ports:
      - "${PG_HOST_PORT:-6100}:5432"
    volumes:
      - qatask_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_SUPERUSER} -d ${PG_SUPERDB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.6
    container_name: qatask-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASS}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASS}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${KC_HOST_PORT:-6101}
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KC_HOST_PORT:-6101}:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  api:
    build:
      context: ./ApiService
      dockerfile: Dockerfile
    container_name: qatask-api
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__QaTaskDb: "Host=postgres;Port=5432;Database=${APP_DB_NAME};Username=${APP_DB_USER};Password=${APP_DB_PASS}"
      Keycloak__Authority: "http://localhost:${KC_HOST_PORT:-6101}/realms/qa-task"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/qa-task/.well-known/openid-configuration"
      Keycloak__ClientId: "qa-task-web"
      Keycloak__ClientSecret: "${KC_CLIENT_SECRET}"
      Frontend__BaseUrl: ""
    ports:
      - "5118:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qatask-frontend
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "4101:4101"

volumes:
  qatask_postgres_data:
